apis:
  - aid: uq:espace-oai
    name: UQ eSpace OAI-PMH
    description: >-
      OAI-PMH metadata harvesting interface for UQ eSpace, the University of
      Queensland's institutional digital repository of research publications,
      theses, and datasets. Supports standard OAI-PMH verbs (Identify,
      ListRecords, ListMetadataFormats, GetRecord) for harvesting scholarly
      metadata.
    humanURL: https://espace.library.uq.edu.au/
    baseURL: https://espace.library.uq.edu.au/oai.php
    tags: [ Library, Institutional Repository, OAI-PMH, Metadata, Research ]
    properties:
      - type: Documentation
        url: https://espace.library.uq.edu.au/about
  - aid: uq:espace-api
    name: UQ eSpace REST API
    description: >-
      REST API for UQ eSpace providing programmatic access to research outputs
      and dataset records held in the repository. UQ Library has published API
      documentation with executable examples describing the available endpoints.
    humanURL: https://espace.library.uq.edu.au/view/UQ:10582
    tags: [ Library, Institutional Repository, REST, Research, Datasets ]
    properties:
      - type: Documentation
        url: https://espace.library.uq.edu.au/view/UQ:10582
      - type: GitHub
        url: https://github.com/uqlibrary
  - aid: uq:central-integration
    name: Central Integration Platform
    description: >-
      UQ's API platform for transactional and business data, used to integrate
      institutional systems. Access is not open or self-service; developers must
      request access via the Integration Services Team and complete the relevant
      data governance approvals. No public endpoints are published.
    humanURL: https://data.uq.edu.au/explore-and-access-data/central-integration-platform
    tags: [ Integration, Enterprise Data, Gated, Access Controlled ]
    properties:
      - type: Documentation
        url: https://data.uq.edu.au/explore-and-access-data/central-integration-platform
