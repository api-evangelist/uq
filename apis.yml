---
aid: uq
name: University of Queensland
description: >-
  The University of Queensland (UQ) is a public research university in Brisbane,
  Australia, ranked #54 in the QS World University Rankings 2025. UQ's public
  developer and API footprint is concentrated in its library and research
  infrastructure: UQ eSpace, the institutional digital repository (built on the
  Fez/Fedora platform), exposes an OAI-PMH metadata harvesting endpoint and a
  documented REST API with executable examples. The UQ Library maintains an
  active public GitHub organisation (uqlibrary) with 150+ repositories. Broader
  institutional/transactional data access is governed through the Central
  Integration Platform and Data Hub, which are gated and require approval rather
  than offering open self-service APIs.
